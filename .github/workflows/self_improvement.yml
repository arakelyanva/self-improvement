name: Automated Self-Improvement
on:
  schedule:
    - cron: '0 */2 * * *' 
  workflow_dispatch: # Allows manual pipeline testing

jobs:
  self_improvement:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Install uv Package Manager
        uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'
          enable-cache: true
          cache-dependency-glob: 'uv.lock'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Dependencies
        run: uv sync
      
      - name: Run AI Improvement Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_ACCESS_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
        run: uv run python scripts/agent.py
